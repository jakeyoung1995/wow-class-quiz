<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found · WoW Class Quiz</title>
  <meta name="robots" content="noindex">
  <style>
    :root { --bg: #0d0d12; --gold: #c89b3c; --text: #e8e0d0; --text2: #9a8f80; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif;
           display: flex; flex-direction: column; align-items: center; justify-content: center;
           min-height: 100vh; text-align: center; padding: 24px; }
    h1 { font-size: 72px; color: var(--gold); line-height: 1; }
    h2 { font-size: 22px; margin: 12px 0 8px; }
    p  { color: var(--text2); font-size: 15px; margin-bottom: 32px; }
    a  { display: inline-block; background: var(--gold); color: #0a0800;
         font-weight: 700; padding: 12px 28px; border-radius: 99px;
         text-decoration: none; font-size: 15px; }
    a:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <h1>404</h1>
  <h2>Page not found</h2>
  <p>This page doesn't exist — but your perfect WoW class is waiting.</p>
  <a href="/">Find My Class →</a>
</body>
</html>
