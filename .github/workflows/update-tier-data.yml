name: Weekly Tier List Update

on:
  schedule:
    # Every Monday at 10:00 UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (parse only, do not commit or send email)'
        required: false
        default: 'false'
        type: string

permissions:
  contents: write
  issues: write

jobs:
  update-tier-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run tier update script
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/update_tier_data.py

      - name: Commit updated tier data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --global user.name "wow-class-quiz-bot"
          git config --global user.email "actions@github.com"
          git add wow-patch-data.json
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to wow-patch-data.json — nothing to commit."
          else
            CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
            git commit -m "chore: weekly tier update $(date +%Y-%m-%d) [skip ci]

Automated update from Icy Veins tier lists.
Files changed: $CHANGED"
            git push
            echo "Committed and pushed tier data update."
          fi
