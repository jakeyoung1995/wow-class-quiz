<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="13" fill="#0a0600"/>
  <rect width="64" height="64" rx="13" fill="none" stroke="#c89a30" stroke-width="1.5" opacity="0.7"/>
  <!-- Sword 1: top-left to bottom-right -->
  <line x1="10" y1="10" x2="54" y2="54" stroke="#d4a030" stroke-width="4" stroke-linecap="round"/>
  <!-- Sword 2: top-right to bottom-left -->
  <line x1="54" y1="10" x2="10" y2="54" stroke="#d4a030" stroke-width="4" stroke-linecap="round"/>
  <!-- Crossguard 1 (upper-left sword, near handle) -->
  <line x1="10" y1="22" x2="22" y2="10" stroke="#f8dc80" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crossguard 2 (upper-right sword, near handle) -->
  <line x1="42" y1="10" x2="54" y2="22" stroke="#f8dc80" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center gem -->
  <circle cx="32" cy="32" r="3.5" fill="#f8dc80" opacity="0.9"/>
</svg>
